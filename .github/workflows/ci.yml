name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
            ${{ runner.os }}-pip-

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 flake8-bugbear

      - name: Run flake8 linter
        run: |
          flake8 backend/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --statistics \
            --count \
            --show-source

  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend-lint
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install system deps (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run backend tests with coverage
        run: |
          python -m pytest backend/tests/ -v --tb=short \
            --cov=backend \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Check coverage threshold (>= 60%)
        if: matrix.python-version == '3.12'
        run: |
          coverage_rate=$(python -c "import xml.etree.ElementTree as ET; tree=ET.parse('coverage.xml'); print(tree.getroot().attrib['line-rate'])")
          echo "Line coverage rate: $coverage_rate"
          python -c "rate=float('$coverage_rate'); pct=rate*100; assert rate >= 0.60, f'Coverage {pct:.1f}% is below 60% threshold'; print(f'Coverage OK: {pct:.1f}%')"

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npx ng test --watch=false --browsers=ChromeHeadless

      - name: Build
        working-directory: frontend
        run: npx ng build --configuration=production

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build and tag backend image (SHA + latest)
        run: |
          docker build --no-cache -f backend/Dockerfile \
            -t imdb-backend:${{ github.sha }} \
            -t imdb-backend:latest \
            .

      - name: Build and tag frontend image (SHA + latest)
        run: |
          docker build --no-cache -f frontend/Dockerfile \
            -t imdb-frontend:${{ github.sha }} \
            -t imdb-frontend:latest \
            ./frontend

      - name: Export image digests for traceability
        run: |
          echo "## Docker Image Digests" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | SHA Tag | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|---------|------|" >> "$GITHUB_STEP_SUMMARY"
          BACKEND_SIZE=$(docker image inspect imdb-backend:${{ github.sha }} --format '{{.Size}}')
          FRONTEND_SIZE=$(docker image inspect imdb-frontend:${{ github.sha }} --format '{{.Size}}')
          echo "| imdb-backend | \`${{ github.sha }}\` | ${BACKEND_SIZE} bytes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| imdb-frontend | \`${{ github.sha }}\` | ${FRONTEND_SIZE} bytes |" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify backend image
        run: docker image inspect imdb-backend:${{ github.sha }} --format '{{.Size}}'

      - name: Verify frontend image
        run: docker image inspect imdb-frontend:${{ github.sha }} --format '{{.Size}}'

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks secret scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (CRITICAL — blocking)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Run Trivy vulnerability scanner (HIGH — advisory)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pip-audit for Python dependency vulnerabilities
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Run npm audit for frontend vulnerabilities
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level=high
