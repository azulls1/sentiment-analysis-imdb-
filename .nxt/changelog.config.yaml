changelog:
  # Archivo de salida
  output: CHANGELOG.md

  # Formato de fecha
  date_format: "YYYY-MM-DD"

  # Version actual
  current_version: "1.0.0"

  # Proyecto
  project_name: "Analisis de Sentimientos - IMDb Movie Reviews"
  project_context: "UNIR Master's Degree - Primer Semestre - Actividad 2"

  # Incluir en changelog
  include:
    - feat
    - fix
    - perf
    - refactor
    - security
    - deprecate
    - remove

  # Excluir del changelog
  exclude:
    - docs
    - style
    - test
    - chore
    - ci

  # Agrupar por scope
  group_by_scope: false

  # Incluir links a commits
  include_commit_links: true

  # Incluir links a issues/PRs
  include_issue_links: true

  # Repositorio para links
  repository: ""

  # Template personalizado
  template: null  # usa default

  # Directorio de release notes
  releases_dir: "docs/releases/"

  # Validacion
  validation:
    require_conventional_commits: true
    require_issue_reference: false
    max_subject_length: 72

  # Historial de versiones
  versions:
    - version: "1.0.0"
      date: "2026-03-16"
      type: "initial_release"
      entries:
        added: 13
        fixed: 1
        removed: 1
      breaking_changes: 0

  # Ultima actualizacion
  last_generated: "2026-03-16"
  generated_by: "nxt-changelog-agent-v3.6.0"
