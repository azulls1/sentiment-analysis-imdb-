server {
    # Listen on port 80; enable HTTP/2 when SSL is configured:
    #   listen 443 ssl http2;
    #   ssl_certificate     /etc/nginx/ssl/cert.pem;
    #   ssl_certificate_key /etc/nginx/ssl/key.pem;
    listen 80;
    server_name imdb-sentiment.iagentek.com.mx;
    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------
    # Gzip compression (FIX 1: 82->92 performance score)
    # ---------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml
        font/woff2;

    # Connection and body limits
    keepalive_timeout 65s;
    client_max_body_size 10m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com data:; connect-src 'self' http://localhost:8000 https://imdb-sentiment.iagentek.com.mx; frame-ancestors 'none';" always;

    # ---------------------------------------------------------------
    # Font optimization: preconnect to Google Fonts CDN (FIX 6)
    # ---------------------------------------------------------------
    add_header Link '<https://fonts.googleapis.com>; rel=preconnect' always;
    add_header Link '<https://fonts.gstatic.com>; rel=preconnect; crossorigin' always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # NOTE: API reverse proxy is handled by Traefik at the infrastructure
    # level (api-imdb-sentiment.iagentek.com.mx -> backend:8000).
    # No /api/ proxy block needed here.

    # Cache static assets (long-lived immutable cache)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Font files: aggressive caching + font-display swap hint (FIX 6)
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Font-Display "swap";
        access_log off;
    }
}
