name: create-brownfield-epic
description: Crea epics para modificaciones en proyecto existente
phase: 4
agent: sm
version: 1.0
project_type: brownfield

triggers:
  - "*create-brownfield-epic"
  - "*brownfield-epic"

inputs:
  - brownfield_prd: "PRD brownfield"
  - risk_assessment: "Evaluación de riesgos"
  - architecture: "Arquitectura brownfield"

purpose: |
  Crear epics específicos para proyectos brownfield.
  Incluye consideraciones de riesgo y regresión.

steps:
  - name: "Cargar contexto brownfield"
    action: "Leer documentación del cambio"
    reads:
      - "docs/2-planning/prd-brownfield.md"
      - "docs/2-planning/risk-assessment-*.md"
      - "docs/3-solutioning/architecture-brownfield.md"
      - "docs/existing-system-documentation.md"
    output: brownfield_context

  - name: "Identificar áreas de cambio"
    action: "Mapear scope de modificaciones"
    categorize:
      new_functionality: "Código nuevo sin tocar existente"
      modifications: "Cambios a código existente"
      integrations: "Nuevas conexiones con código existente"
      migrations: "Cambios en datos/esquemas"
    output: change_categories

  - name: "Agrupar en epics"
    action: "Crear epics por área"
    criteria:
      - "Minimizar cambios simultáneos en mismas áreas"
      - "Permitir rollback por epic"
      - "Considerar dependencias"
      - "Balancear riesgo por epic"
    for_each_epic:
      - "Nombre descriptivo"
      - "Tipo (new/modify/integrate/migrate)"
      - "Áreas del código afectadas"
      - "Riesgo de regresión"
      - "Dependencias"
    output: brownfield_epics

  - name: "Evaluar riesgo por epic"
    action: "Asignar nivel de riesgo"
    factors:
      - "Cantidad de código existente afectado"
      - "Criticidad de las áreas"
      - "Complejidad del cambio"
      - "Cobertura de tests existente"
    levels: ["low", "medium", "high", "critical"]
    output: epic_risks

  - name: "Ordenar epics"
    action: "Priorizar considerando riesgo"
    strategy:
      - "Empezar con epics de bajo riesgo"
      - "Evitar múltiples epics high-risk en paralelo"
      - "Considerar dependencias técnicas"
      - "Valor de negocio"
    output: ordered_epics

  - name: "Definir criterios de aceptación del epic"
    action: "Establecer Definition of Done especial"
    include:
      - "Funcionalidad nueva funciona"
      - "Funcionalidad existente NO se rompe"
      - "Tests de regresión pasan"
      - "Performance no degradada"
      - "Rollback probado"
    output: epic_acceptance_criteria

  - name: "Crear documentos de epic"
    action: "Generar archivo por epic"
    template: |
      # Epic Brownfield: [Nombre]

      ## Metadata
      - ID: EPIC-BF-[número]
      - Tipo: [new/modify/integrate/migrate]
      - Riesgo: [low/medium/high/critical]
      - Prioridad: [Must/Should/Could]

      ## Descripción
      [Qué se va a hacer]

      ## Áreas del Código Afectadas
      - `path/to/area1/` - [tipo de cambio]
      - `path/to/area2/` - [tipo de cambio]

      ## Impacto en Sistema Existente
      | Área | Impacto | Riesgo |
      |------|---------|--------|

      ## Dependencias
      - EPIC-BF-XX: [Razón]

      ## Criterios de Aceptación
      - [ ] Nueva funcionalidad implementada
      - [ ] Tests de regresión pasan
      - [ ] No hay degradación de performance
      - [ ] Feature flag funciona
      - [ ] Rollback probado

      ## Estrategia de Rollback
      [Cómo revertir si algo sale mal]

      ## Stories Preliminares
      1. [Story 1]
      2. [Story 2]

outputs:
  - "docs/2-planning/epics/EPIC-BF-001-[nombre].md"
  - "docs/2-planning/epics-brownfield-overview.md"

next_steps:
  - "*create-brownfield-story [epic]"
  - "*tech-spec [epic]"
