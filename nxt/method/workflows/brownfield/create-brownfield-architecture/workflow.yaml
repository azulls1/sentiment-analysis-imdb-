name: create-brownfield-architecture
description: Documenta y actualiza la arquitectura de un proyecto existente
phase: 3
agent: architect
version: 1.0
project_type: brownfield

triggers:
  - "*create-brownfield-architecture"
  - "*brownfield-architecture"

inputs:
  - existing_docs: "Documentación del sistema existente"
  - codebase_analysis: "Análisis del código"
  - brownfield_prd: "PRD brownfield con cambios propuestos"

purpose: |
  Crear o actualizar documentación de arquitectura para proyectos existentes.
  Documenta el estado actual Y los cambios propuestos.

steps:
  - name: "Cargar análisis existente"
    action: "Leer documentación previa"
    reads:
      - "docs/existing-system-documentation.md"
      - "docs/1-analysis/codebase-analysis.md"
      - "docs/2-planning/prd-brownfield.md"
    output: existing_context

  - name: "Documentar arquitectura actual"
    action: "Crear diagrama del estado actual"
    document:
      - "System context actual"
      - "Container diagram actual"
      - "Tech stack actual"
      - "Integraciones existentes"
      - "Patrones en uso"
    output: current_architecture

  - name: "Identificar áreas de cambio"
    action: "Mapear qué cambiará"
    from_prd:
      - "Nuevos componentes"
      - "Componentes a modificar"
      - "Integraciones nuevas"
      - "Cambios en datos"
    output: change_areas

  - name: "Diseñar arquitectura objetivo"
    action: "Crear arquitectura target"
    define:
      - "System context objetivo"
      - "Container diagram objetivo"
      - "Nuevos componentes"
      - "Modificaciones a existentes"
      - "Estrategia de migración"
    output: target_architecture

  - name: "Definir estrategia de transición"
    action: "Planificar cómo llegar al objetivo"
    consider:
      - "Backward compatibility"
      - "Feature flags necesarios"
      - "Migraciones de datos"
      - "Rollback strategy"
      - "Fases de implementación"
    output: transition_strategy

  - name: "Evaluar impacto técnico"
    action: "Analizar riesgos técnicos"
    assess:
      - "Componentes afectados"
      - "Riesgo de regresión"
      - "Performance impact"
      - "Security considerations"
    output: impact_assessment

  - name: "Crear ADRs"
    action: "Documentar decisiones arquitectónicas"
    for_each_decision:
      - "Contexto"
      - "Decisión"
      - "Alternativas consideradas"
      - "Consecuencias"
    output: architecture_decisions

  - name: "Generar documento"
    action: "Crear architecture doc brownfield"
    template: |
      # Arquitectura Brownfield: [Proyecto]

      ## 1. Arquitectura Actual
      ### System Context
      [Diagrama actual]

      ### Tech Stack Actual
      [Tecnologías en uso]

      ### Patrones Actuales
      [Patrones identificados]

      ## 2. Cambios Propuestos
      ### Nuevos Componentes
      [Lista con justificación]

      ### Modificaciones
      [Componentes a modificar]

      ## 3. Arquitectura Objetivo
      ### System Context Target
      [Diagrama objetivo]

      ### Tech Stack Cambios
      [Nuevas tecnologías si aplica]

      ## 4. Estrategia de Transición
      ### Fases
      [Fases de implementación]

      ### Feature Flags
      [Flags necesarios]

      ### Rollback Plan
      [Cómo revertir]

      ## 5. Impacto y Riesgos
      [Assessment de impacto]

      ## 6. ADRs
      [Decisiones documentadas]

outputs:
  - "docs/3-solutioning/architecture-brownfield.md"
  - "docs/3-solutioning/adrs/adr-xxx-[decision].md"

next_steps:
  - "*tech-spec [epic]"
  - "*create-brownfield-epic"
