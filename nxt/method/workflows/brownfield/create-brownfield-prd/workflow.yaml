name: create-brownfield-prd
description: Crear PRD para modificaciones en proyecto existente
phase: 2
agent: pm
version: 1.0
project_type: brownfield

triggers:
  - "*create-brownfield-prd"
  - "*prd-brownfield"

inputs:
  - existing_docs: "Documentación del sistema existente"
  - codebase_analysis: "Análisis del código"
  - change_request: "Descripción del cambio solicitado"

purpose: |
  PRD especializado para proyectos brownfield.
  Considera el sistema existente y minimiza riesgos.

steps:
  - name: "Cargar contexto existente"
    action: "Leer documentación del sistema"
    reads:
      - "docs/existing-system-documentation.md"
      - "docs/1-analysis/codebase-analysis.md"
      - "docs/1-analysis/tech-debt-inventory.md"
    output: existing_context

  - name: "Definir alcance del cambio"
    action: "Clarificar qué se va a modificar"
    define:
      - "Funcionalidad a agregar/modificar"
      - "Áreas del sistema afectadas"
      - "Áreas que NO se deben tocar"
      - "Dependencias con sistema existente"
    output: change_scope

  - name: "Evaluar impacto"
    action: "Analizar impacto en sistema existente"
    assess:
      - "Componentes afectados"
      - "APIs que cambian"
      - "Base de datos (migraciones)"
      - "Integraciones externas"
      - "Usuarios afectados"
    output: impact_assessment

  - name: "Identificar constraints"
    action: "Documentar limitaciones"
    constraints:
      technical:
        - "Tecnologías que deben mantenerse"
        - "Patrones existentes a seguir"
        - "Versiones fijas"
      business:
        - "Funcionalidad que no puede romperse"
        - "SLAs existentes"
        - "Compliance requirements"
    output: constraints

  - name: "Definir requisitos"
    action: "Crear requisitos específicos para cambio"
    for_each_requirement:
      - "ID único"
      - "Descripción"
      - "Justificación"
      - "Prioridad"
      - "Componentes afectados"
      - "Riesgo de regresión"
    output: requirements

  - name: "Planificar migraciones"
    action: "Definir estrategia de transición"
    consider:
      - "Backward compatibility"
      - "Feature flags"
      - "Rollback strategy"
      - "Data migration"
      - "API versioning"
    output: migration_plan

  - name: "Generar PRD Brownfield"
    action: "Crear documento PRD"
    template: |
      # PRD Brownfield: [Nombre del Cambio]

      ## Metadata
      - Versión: 1.0
      - Fecha: [fecha]
      - Tipo: Brownfield
      - Sistema: [nombre del sistema]

      ## 1. Contexto del Sistema Existente
      ### Estado Actual
      [Descripción del sistema actual relevante]

      ### Documentación de Referencia
      - [Link a docs existentes]

      ## 2. Cambio Propuesto
      ### Descripción
      [Qué se va a cambiar/agregar]

      ### Justificación
      [Por qué se necesita este cambio]

      ### Objetivos
      | Objetivo | KPI | Target |
      |----------|-----|--------|

      ## 3. Alcance
      ### En Alcance
      - [Item 1]

      ### Fuera de Alcance
      - [Item 1]

      ### Áreas Protegidas (No Tocar)
      - [Área 1]: [Razón]

      ## 4. Impacto en Sistema Existente
      | Componente | Tipo de Cambio | Riesgo |
      |------------|----------------|--------|

      ## 5. Requisitos Funcionales
      | ID | Requisito | Prioridad | Componentes | Riesgo |
      |----|-----------|-----------|-------------|--------|

      ## 6. Requisitos No Funcionales
      | ID | Categoría | Requisito | Baseline Actual |
      |----|-----------|-----------|-----------------|

      ## 7. Constraints
      ### Técnicos
      - [Constraint]

      ### De Negocio
      - [Constraint]

      ## 8. Estrategia de Migración
      ### Enfoque
      [Big bang / Incremental / Feature flags]

      ### Rollback Plan
      [Cómo revertir si hay problemas]

      ### Data Migration
      [Si aplica]

      ## 9. Riesgos
      | Riesgo | Probabilidad | Impacto | Mitigación |
      |--------|--------------|---------|------------|

      ## 10. Criterios de Éxito
      - [ ] [Criterio]
      - [ ] No regresiones en funcionalidad existente
      - [ ] Performance igual o mejor

outputs:
  - "docs/2-planning/prd-brownfield.md"

next_steps:
  - "*risk-assessment"
  - "*create-brownfield-architecture"
  - "*create-brownfield-epic"
