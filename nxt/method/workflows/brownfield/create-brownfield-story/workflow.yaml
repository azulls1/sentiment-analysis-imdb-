name: create-brownfield-story
description: Crea stories para proyectos brownfield con contexto de regresión
phase: 4
agent: sm
version: 1.0
project_type: brownfield

triggers:
  - "*create-brownfield-story [epic]"
  - "*brownfield-story [epic]"

inputs:
  - epic_id: "ID del epic brownfield"
  - existing_code: "Análisis del código existente"
  - risk_assessment: "Evaluación de riesgos"

purpose: |
  Crear stories especializadas para brownfield que incluyen:
  - Contexto del código existente
  - Puntos de integración
  - Tests de regresión necesarios
  - Estrategia de rollback

steps:
  - name: "Cargar epic brownfield"
    action: "Leer contexto del epic"
    reads:
      - "docs/2-planning/epics/[epic_id].md"
      - "docs/3-solutioning/tech-specs/[epic]-tech-spec.md"
      - "docs/existing-system-documentation.md"
    output: epic_context

  - name: "Identificar puntos de integración"
    action: "Mapear donde conecta con código existente"
    for_each_story:
      - "Archivos existentes a modificar"
      - "Interfaces que se usan"
      - "Datos que se comparten"
      - "APIs que se llaman"
    output: integration_points

  - name: "Analizar código existente"
    action: "Entender código que se modificará"
    extract:
      - "Patrones actuales"
      - "Tests existentes"
      - "Dependencias"
      - "Complejidad"
    output: existing_code_analysis

  - name: "Definir tests de regresión"
    action: "Identificar qué podría romperse"
    for_each_story:
      - "Funcionalidades relacionadas"
      - "Tests existentes a ejecutar"
      - "Nuevos tests de regresión"
      - "Escenarios de edge case"
    output: regression_tests

  - name: "Crear stories"
    action: "Generar stories con contexto brownfield"
    for_each_story:
      include:
        - "Descripción estándar (Como/Quiero/Para)"
        - "Criterios de aceptación"
        - "**Código existente afectado**"
        - "**Puntos de integración**"
        - "**Tests de regresión requeridos**"
        - "**Feature flag**"
        - "**Rollback steps**"
    output: brownfield_stories

  - name: "Estimar con factor de riesgo"
    action: "Agregar buffer por riesgo brownfield"
    factors:
      - "Complejidad del código existente"
      - "Cobertura de tests actual"
      - "Riesgo de regresión"
    multiplier:
      low_risk: "1.0x"
      medium_risk: "1.3x"
      high_risk: "1.5x"
    output: estimates

  - name: "Generar documentos"
    action: "Crear archivos de story"
    template: |
      # Story Brownfield: [ID] - [Título]

      ## Metadata
      - Epic: [EPIC-BF-ID]
      - Tipo: [new/modify/integrate]
      - Riesgo: [low/medium/high]
      - Estimación: [puntos] (incluye factor riesgo)

      ## User Story
      Como [rol]
      Quiero [funcionalidad]
      Para [beneficio]

      ## Criterios de Aceptación
      - [ ] [Criterio funcional 1]
      - [ ] [Criterio funcional 2]
      - [ ] **No hay regresión en [área]**
      - [ ] **Tests de regresión pasan**

      ## Código Existente Afectado
      | Archivo | Tipo de Cambio | Riesgo |
      |---------|----------------|--------|
      | `path/file.ts` | Modificar | Medium |

      ## Puntos de Integración
      - [Interface/API que se usa]
      - [Datos compartidos]

      ## Tests de Regresión Requeridos
      ### Existentes a Ejecutar
      - `test/existing-test.spec.ts`

      ### Nuevos a Crear
      - [ ] Test para [escenario que podría romperse]

      ## Feature Flag
      - Nombre: `feature_[nombre]_enabled`
      - Default: `false`
      - Cómo activar: [instrucciones]

      ## Rollback Steps
      1. Desactivar feature flag
      2. [Paso adicional si necesario]
      3. Verificar funcionalidad anterior funciona

      ## Definition of Done (Brownfield)
      - [ ] Código implementado
      - [ ] Unit tests nuevos (coverage >80%)
      - [ ] **Tests de regresión pasan**
      - [ ] **Performance no degradada**
      - [ ] Feature flag funciona
      - [ ] Rollback probado
      - [ ] Code review aprobado

outputs:
  - "docs/4-implementation/stories/[epic]-BF-[story].md"

next_steps:
  - "*story-context [story]"
  - "*dev-story [story]"
