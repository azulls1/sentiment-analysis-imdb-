name: workflow-init
description: Analiza proyecto y recomienda track de trabajo
phase: 0
agent: orchestrator
version: 1.0

triggers:
  - "/nxt/init"

inputs:
  - project_directory: "Directorio actual del proyecto"

steps:
  - name: "Escanear directorio"
    action: "Examinar estructura de archivos existentes"
    checks:
      - "¿Existe código fuente?"
      - "¿Existe package.json/requirements.txt/etc?"
      - "¿Existe .git?"
      - "¿Existen docs previos?"
    output: scan_result

  - name: "Detectar tipo de proyecto"
    action: "Determinar greenfield o brownfield"
    conditions:
      greenfield:
        - "No hay código fuente"
        - "O solo hay boilerplate vacío"
      brownfield:
        - "Existe código fuente funcional"
        - "Hay historial de commits"
    output: project_type

  - name: "Evaluar complejidad"
    action: "Estimar escala del proyecto"
    criteria:
      quick:
        stories: "1-15"
        duration: "<2 semanas"
        indicators:
          - "Feature único"
          - "Bug fix"
          - "Mejora pequeña"
      standard:
        stories: "15-50"
        duration: "2-8 semanas"
        indicators:
          - "MVP completo"
          - "Módulo nuevo"
          - "Refactor significativo"
      enterprise:
        stories: "50+"
        duration: ">8 semanas"
        indicators:
          - "Sistema completo"
          - "Múltiples módulos"
          - "Integración compleja"
    output: scale_recommendation

  - name: "Preguntar tech stack"
    action: "Si es greenfield, preguntar preferencias"
    questions:
      - "¿Frontend? [react/vue/angular/next/none]"
      - "¿Backend? [node/python/go/none]"
      - "¿Base de datos? [postgresql/mongodb/mysql/none]"
    skip_if: "brownfield (detectar del código existente)"
    output: tech_stack

  - name: "Generar recomendación"
    action: "Crear recomendación completa"
    output:
      project_type: "[greenfield|brownfield]"
      scale: "[quick|standard|enterprise]"
      tech_stack: "[detected or selected]"
      next_step: "[workflow recomendado]"
      next_agent: "[agente a activar]"

outputs:
  - recommendation.md
  - nxt-project.yaml (configuración del proyecto)

post_actions:
  - "Crear nxt-project.yaml con la configuración"
  - "Mostrar siguiente paso recomendado"
  - "Ofrecer activar el siguiente agente"
