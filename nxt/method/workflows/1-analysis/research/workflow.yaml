name: research
description: Investigación profunda de mercado, técnica o de usuario
phase: 1
agent: researcher
version: 1.0

triggers:
  - "*research [tema]"
  - "*investigar [tema]"

inputs:
  - topic: "Tema a investigar"
  - type: "Tipo de investigación (market/technical/user)"

steps:
  - name: "Definir alcance"
    action: "Clarificar qué se necesita investigar"
    questions:
      - "¿Qué tipo de investigación? (mercado/técnica/usuario)"
      - "¿Cuál es el objetivo principal?"
      - "¿Hay restricciones de tiempo/recursos?"
    output: research_scope

  - name: "Investigación de mercado"
    condition: "type == 'market'"
    action: "Analizar mercado y competencia"
    tasks:
      - "Identificar competidores directos e indirectos"
      - "Analizar features de competidores"
      - "Identificar gaps en el mercado"
      - "Evaluar tendencias del sector"
      - "Estimar tamaño de mercado (TAM/SAM/SOM)"
    output: market_research

  - name: "Investigación técnica"
    condition: "type == 'technical'"
    action: "Evaluar opciones tecnológicas"
    tasks:
      - "Listar tecnologías candidatas"
      - "Evaluar pros/cons de cada una"
      - "Verificar madurez y soporte"
      - "Analizar curva de aprendizaje"
      - "Evaluar escalabilidad"
      - "Considerar costos"
    output: technical_research

  - name: "Investigación de usuario"
    condition: "type == 'user'"
    action: "Entender necesidades del usuario"
    tasks:
      - "Definir segmentos de usuario"
      - "Identificar pain points"
      - "Mapear user journeys actuales"
      - "Identificar jobs-to-be-done"
      - "Analizar comportamientos"
    output: user_research

  - name: "Sintetizar hallazgos"
    action: "Consolidar resultados"
    deliverables:
      - "Resumen ejecutivo"
      - "Hallazgos clave (top 5)"
      - "Recomendaciones"
      - "Próximos pasos"
    output: research_synthesis

  - name: "Generar documento"
    action: "Crear documento de investigación"
    format: "markdown o docx según preferencia"
    output: research_document

outputs:
  - "docs/1-analysis/research-[tipo]-[tema].md"
  - "docs/1-analysis/research-[tipo]-[tema].docx" (opcional)

next_steps:
  - "Si es para producto nuevo: *product-brief"
  - "Si es para decisión técnica: *architecture"
  - "Si es para entender usuarios: *personas"
