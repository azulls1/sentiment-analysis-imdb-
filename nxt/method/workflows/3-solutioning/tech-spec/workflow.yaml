name: tech-spec
description: Genera especificación técnica detallada para un epic
phase: 3
agent: architect
version: 1.0

triggers:
  - "*tech-spec [epic]"
  - "*especificacion-tecnica [epic]"

inputs:
  - epic_id: "ID del epic"
  - architecture: "Documento de arquitectura existente"
  - prd: "PRD del proyecto"

purpose: |
  Crea especificaciones técnicas just-in-time para cada epic.
  No se crean todas de una vez, sino cuando se van a implementar.

steps:
  - name: "Cargar contexto"
    action: "Leer documentos relevantes"
    reads:
      - "docs/2-planning/prd.md"
      - "docs/3-solutioning/architecture.md"
      - "docs/2-planning/epics/[epic_id].md"
    output: context

  - name: "Analizar epic"
    action: "Entender requisitos del epic"
    extract:
      - "Funcionalidades requeridas"
      - "Usuarios afectados"
      - "Criterios de aceptación"
      - "Dependencias"
    output: epic_analysis

  - name: "Diseñar componentes"
    action: "Definir componentes técnicos"
    define:
      - "Nuevos componentes a crear"
      - "Componentes existentes a modificar"
      - "Interfaces entre componentes"
      - "Contratos de datos"
    output: component_design

  - name: "Diseñar APIs"
    action: "Especificar endpoints necesarios"
    for_each_endpoint:
      - "Método HTTP"
      - "Path"
      - "Request body/params"
      - "Response format"
      - "Error cases"
      - "Autenticación requerida"
    output: api_design

  - name: "Diseñar modelo de datos"
    action: "Definir entidades y relaciones"
    define:
      - "Nuevas entidades"
      - "Campos y tipos"
      - "Relaciones"
      - "Índices necesarios"
      - "Migraciones"
    output: data_model

  - name: "Identificar dependencias"
    action: "Mapear dependencias técnicas"
    identify:
      - "Librerías externas"
      - "Servicios de terceros"
      - "Otros epics"
      - "Configuración necesaria"
    output: dependencies

  - name: "Definir criterios técnicos"
    action: "Establecer requisitos no funcionales"
    define:
      - "Performance esperado"
      - "Límites de recursos"
      - "Requisitos de seguridad"
      - "Logging/monitoring"
    output: technical_criteria

  - name: "Generar documento"
    action: "Crear tech spec completo"
    template: |
      # Tech Spec: [Epic Name]

      ## 1. Resumen
      [Descripción breve del epic y su propósito]

      ## 2. Contexto
      ### Del PRD
      [Requisitos relevantes]

      ### De la Arquitectura
      [Decisiones que aplican]

      ## 3. Diseño Técnico
      ### 3.1 Componentes
      [Diagrama y descripción]

      ### 3.2 APIs
      [Endpoints detallados]

      ### 3.3 Modelo de Datos
      [Entidades y relaciones]

      ## 4. Dependencias
      [Listado con justificación]

      ## 5. Criterios de Aceptación Técnicos
      [Performance, seguridad, etc.]

      ## 6. Plan de Implementación
      [Orden sugerido de stories]

      ## 7. Riesgos Técnicos
      [Riesgos identificados y mitigaciones]

outputs:
  - "docs/3-solutioning/tech-specs/[epic-id]-tech-spec.md"

next_steps:
  - "*create-story [epic]"
  - "*story-context [story]"
