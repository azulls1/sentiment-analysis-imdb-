name: architecture
description: Diseñar arquitectura del sistema
phase: 3
agent: architect
version: 1.0

triggers:
  - "*architecture"
  - "*arch"

inputs:
  - prd: "docs/2-planning/prd.md"
  - tech_stack: "Tech stack preferido o detectado"

purpose: |
  Diseñar la arquitectura técnica del sistema que soporte
  todos los requisitos funcionales y no funcionales del PRD.

steps:
  - name: "Analizar requisitos"
    action: "Extraer requisitos arquitectónicos del PRD"
    extract:
      - "Requisitos funcionales clave"
      - "Requisitos no funcionales (especialmente performance, seguridad, escalabilidad)"
      - "Integraciones externas"
      - "Volumen de datos esperado"
      - "Usuarios concurrentes"
    output: architectural_requirements

  - name: "Seleccionar tech stack"
    action: "Definir y justificar tecnologías"
    areas:
      frontend:
        options: ["React", "Next.js", "Vue", "Angular"]
        considerations: ["SEO needs", "SPA vs SSR", "Team experience"]
      backend:
        options: ["Node.js", "Python", "Go", "Java"]
        considerations: ["Performance", "Ecosystem", "Team experience"]
      database:
        options: ["PostgreSQL", "MongoDB", "MySQL"]
        considerations: ["Data structure", "Scalability", "ACID needs"]
      infrastructure:
        options: ["AWS", "GCP", "Azure"]
        considerations: ["Cost", "Services needed", "Team experience"]
    output: tech_stack_decisions

  - name: "Crear diagramas C4"
    action: "Diseñar arquitectura visual"
    diagrams:
      level_1:
        name: "System Context"
        shows: "Sistema y sus actores externos"
      level_2:
        name: "Container Diagram"
        shows: "Aplicaciones, bases de datos, servicios"
      level_3:
        name: "Component Diagram"
        shows: "Componentes internos de cada container"
        conditional: "Si es enterprise scale"
    output: diagrams[]

  - name: "Diseñar APIs"
    action: "Definir contratos de API"
    include:
      - "Endpoints principales"
      - "Request/Response schemas"
      - "Autenticación"
      - "Rate limiting"
      - "Versionamiento"
    format: "OpenAPI 3.0"
    output: api_spec

  - name: "Diseñar modelo de datos"
    action: "Crear ERD y definir entidades"
    include:
      - "Entidades principales"
      - "Relaciones"
      - "Índices recomendados"
      - "Estrategia de migraciones"
    output: data_model

  - name: "Definir patrones de diseño"
    action: "Seleccionar patrones a usar"
    patterns:
      architectural:
        - "Layered Architecture"
        - "Microservices (si aplica)"
        - "Event-Driven (si aplica)"
      design:
        - "Repository Pattern"
        - "Service Layer"
        - "Factory Pattern"
    output: design_patterns

  - name: "Diseñar seguridad"
    action: "Definir estrategia de seguridad"
    aspects:
      authentication: "JWT, OAuth, Sessions"
      authorization: "RBAC, ABAC"
      encryption: "At rest, In transit"
      secrets: "Management strategy"
    output: security_design

  - name: "Planificar escalabilidad"
    action: "Definir estrategia de escalamiento"
    considerations:
      - "Horizontal vs Vertical scaling"
      - "Caching strategy"
      - "Load balancing"
      - "Database scaling"
    output: scalability_plan

  - name: "Documentar ADRs"
    action: "Crear Architecture Decision Records"
    for_each_major_decision:
      template: |
        # ADR-XXX: [Título de la Decisión]

        ## Estado
        [Propuesto|Aceptado|Deprecado|Reemplazado]

        ## Contexto
        [Por qué necesitamos tomar esta decisión]

        ## Decisión
        [Qué decidimos]

        ## Consecuencias
        [Qué implica esta decisión]

        ## Alternativas Consideradas
        [Qué otras opciones evaluamos]
    output: adrs[]

  - name: "Generar documento de arquitectura"
    action: "Compilar documento final"
    output: docs/3-solutioning/architecture.md

outputs:
  - docs/3-solutioning/architecture.md
  - docs/3-solutioning/diagrams/*.mmd
  - docs/3-solutioning/api-spec.yaml
  - docs/3-solutioning/adrs/adr-*.md

checklist:
  - "¿Todos los NFRs tienen solución arquitectónica?"
  - "¿El tech stack está justificado?"
  - "¿Hay diagramas claros?"
  - "¿La seguridad está considerada?"
  - "¿Hay plan de escalabilidad?"
  - "¿Las decisiones importantes tienen ADRs?"

next_steps:
  - "*tech-spec [epic] para crear specs detallados por epic"
  - "*create-epics para extraer epics del PRD"
