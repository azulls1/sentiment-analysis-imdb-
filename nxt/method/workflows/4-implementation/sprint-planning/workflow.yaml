name: sprint-planning
description: Planificación del sprint con stories priorizadas
phase: 4
agent: sm
version: 1.0

triggers:
  - "*sprint-planning"
  - "*planificar-sprint"

inputs:
  - backlog: "Backlog de stories"
  - sprint_number: "Número de sprint"
  - capacity: "Capacidad del sprint (story points)"

steps:
  - name: "Cargar backlog"
    action: "Leer stories disponibles"
    reads:
      - "docs/4-implementation/stories/*.md"
      - "docs/2-planning/epics/*.md"
    filter:
      - "Status: pending o ready"
    output: available_stories

  - name: "Evaluar capacidad"
    action: "Determinar capacidad del sprint"
    consider:
      - "Duración del sprint (típicamente 2 semanas)"
      - "Disponibilidad del desarrollador"
      - "Overhead (reuniones, revisiones, etc.)"
      - "Velocidad histórica (si existe)"
    default: "20-30 story points"
    output: sprint_capacity

  - name: "Seleccionar stories"
    action: "Elegir stories para el sprint"
    criteria:
      priority_order:
        1: "Must have (bloqueantes)"
        2: "Dependencias de Must"
        3: "Should have"
        4: "Could have"
      rules:
        - "No exceder capacidad"
        - "Respetar dependencias"
        - "Preferir stories completas de un epic"
    output: selected_stories

  - name: "Verificar dependencias"
    action: "Confirmar orden de stories"
    check:
      - "Todas las dependencias incluidas"
      - "Orden correcto de implementación"
      - "Sin bloqueos externos"
    output: dependency_check

  - name: "Definir sprint goal"
    action: "Establecer objetivo del sprint"
    format: |
      "Al final del Sprint [N], el sistema podrá [capacidad principal]
       permitiendo [valor para el usuario]"
    output: sprint_goal

  - name: "Crear plan de sprint"
    action: "Generar documento de planificación"
    template: |
      # Sprint [N] Planning

      ## Sprint Goal
      [Objetivo del sprint]

      ## Fechas
      - Inicio: [fecha]
      - Fin: [fecha]
      - Demo: [fecha]

      ## Capacidad
      - Story Points comprometidos: [X]
      - Stories: [Y]

      ## Stories Comprometidas

      | ID | Story | Epic | Puntos | Prioridad |
      |----|-------|------|--------|-----------|
      | S-001 | [Título] | EPIC-001 | 3 | Must |

      ## Orden de Implementación
      1. S-XXX: [Razón de prioridad]
      2. S-XXX: [Razón]

      ## Riesgos del Sprint
      - [Riesgo 1]: [Mitigación]

      ## Definition of Done del Sprint
      - [ ] Todas las stories completadas
      - [ ] Tests pasando (>80% coverage)
      - [ ] Code review aprobado
      - [ ] QA validado
      - [ ] Documentación actualizada

  - name: "Actualizar backlog"
    action: "Marcar stories como 'in sprint'"
    updates:
      - "Cambiar status a 'in_sprint'"
      - "Asignar sprint number"
    output: updated_backlog

outputs:
  - "docs/4-implementation/sprint-[N]-plan.md"
  - "Actualización de stories en backlog"

next_steps:
  - "*story-context [primera-story]"
  - "*dev-story [story]"
