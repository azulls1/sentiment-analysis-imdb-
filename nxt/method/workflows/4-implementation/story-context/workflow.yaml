name: story-context
description: Genera contexto just-in-time para story específica
phase: 4
agent: sm
version: 1.0

triggers:
  - "*story-context [story-id]"

inputs:
  - story_id: "ID de la story"
  - story_file: "Path al archivo de la story"

purpose: |
  Este workflow es el GAME CHANGER del framework.
  Elimina la confusión del desarrollador al proveer contexto PRECISO
  y ESPECÍFICO para cada story, en lugar de listas genéricas.

importance: CRITICAL

rules:
  - "NO generar listas genéricas de archivos"
  - "SOLO incluir archivos que SE MODIFICARÁN"
  - "Incluir dependencias DIRECTAS únicamente"
  - "Código de ejemplo SOLO cuando ayude"
  - "El Dev debe poder empezar SIN preguntas"

steps:
  - name: "Leer story"
    action: "Cargar story completa"
    reads:
      - "docs/4-implementation/stories/[story-file].md"
    extract:
      - "Criterios de aceptación"
      - "Requisitos técnicos"
      - "Dependencias mencionadas"
    output: story_details

  - name: "Analizar criterios de aceptación"
    action: "Entender QUÉ debe hacer la story"
    parse:
      - "Entidades/modelos involucrados"
      - "Acciones del usuario"
      - "Resultados esperados"
      - "Edge cases mencionados"
    output:
      - functionalities: "Lista de funcionalidades"
      - entities: "Entidades involucradas"
      - actions: "Acciones requeridas"

  - name: "Identificar archivos relevantes"
    action: "Buscar SOLO archivos necesarios"
    sources:
      - "docs/3-solutioning/architecture.md"
      - "docs/3-solutioning/tech-specs/*.md"
      - "src/ (código existente)"
    rules:
      strict:
        - "NO listas genéricas ('todos los componentes')"
        - "SOLO archivos que se modificarán directamente"
        - "Incluir dependencias directas que se importarán"
        - "Excluir archivos que solo se leerán como referencia"
    output:
      files_to_modify:
        - path: "ruta/al/archivo"
          reason: "Por qué se modifica"
          changes: "Qué cambios se esperan"
      files_to_create:
        - path: "ruta/nuevo/archivo"
          purpose: "Para qué se crea"

  - name: "Extraer contexto técnico"
    action: "Obtener información específica"
    from_architecture:
      - "Patrones de diseño relevantes"
      - "Convenciones de código"
      - "Estructura de carpetas"
    from_tech_spec:
      - "Detalles de implementación del epic"
      - "APIs a usar"
      - "Modelos de datos"
    from_existing_code:
      - "Patrones similares existentes"
      - "Imports comunes"
      - "Estructura de archivos similares"
    output: technical_context

  - name: "Generar código de referencia"
    action: "Extraer snippets útiles"
    criteria:
      - "Patrones similares existentes en el codebase"
      - "Interfaces/tipos a implementar"
      - "Ejemplos de uso de librerías"
    format: |
      ```typescript
      // Ejemplo de [qué muestra]
      // De: [archivo fuente]
      [código]
      ```
    output: code_snippets[]

  - name: "Identificar riesgos"
    action: "Alertar sobre posibles problemas"
    check:
      - "Dependencias que pueden afectarse"
      - "Tests existentes que pueden romperse"
      - "Edge cases no cubiertos en AC"
    output: risks[]

  - name: "Compilar story-context"
    action: "Generar documento de contexto"
    template: |
      ## Story Context: [story-id]

      ### Resumen de la Story
      [Breve descripción de qué hace la story]

      ### Archivos a Modificar
      | Archivo | Razón | Cambios Esperados |
      |---------|-------|-------------------|
      | `path/file.ts` | [razón] | [cambios] |

      ### Archivos a Crear
      | Archivo | Propósito |
      |---------|-----------|
      | `path/new-file.ts` | [propósito] |

      ### Dependencias a Importar
      ```typescript
      import { X } from '@/services/x';
      import { Y } from '@/types';
      ```

      ### Patrones a Seguir
      [Patrones extraídos del código existente]

      ### Código de Referencia
      [Snippets útiles con explicación]

      ### Del Tech Spec
      [Información relevante del tech-spec del epic]

      ### Riesgos/Consideraciones
      - [Riesgo 1]
      - [Consideración 1]

      ### Checklist Pre-Implementación
      - [ ] Entiendo todos los criterios de aceptación
      - [ ] Sé qué archivos modificar
      - [ ] Conozco los patrones a seguir
      - [ ] Identifico tests a crear/modificar
    output: story_context_document

  - name: "Actualizar story"
    action: "Insertar contexto en la story"
    method: "Append al archivo de story o crear archivo separado"
    output:
      - "docs/4-implementation/stories/[story-id].md (actualizado)"
      - "o docs/4-implementation/stories/[story-id]-context.md (nuevo)"

outputs:
  - "Story context embebido en la story"
  - "O archivo separado: [story-id]-context.md"

success_criteria:
  - "El Dev puede empezar sin hacer preguntas"
  - "No hay archivos genéricos listados"
  - "El contexto es específico y actionable"
  - "Los patrones están claramente identificados"

anti_patterns:
  - "Listar 'todos los archivos del módulo'"
  - "Copiar el tech-spec completo"
  - "No identificar archivos específicos"
  - "Dar contexto sin relación con la story"
