name: code-review
description: Revisión de código para asegurar calidad
phase: 4
agent: reviewer
version: 1.0

triggers:
  - "*code-review"
  - "*review [story]"
  - "*revisar-codigo"

inputs:
  - story_id: "ID de la story implementada"
  - files_changed: "Archivos modificados"

steps:
  - name: "Cargar contexto"
    action: "Obtener información de la story"
    reads:
      - "docs/4-implementation/stories/[story].md"
      - "docs/3-solutioning/architecture.md"
      - "Archivos modificados"
    output: review_context

  - name: "Review de funcionalidad"
    action: "Verificar implementación correcta"
    checklist:
      - "¿Cumple todos los criterios de aceptación?"
      - "¿Maneja edge cases?"
      - "¿Maneja errores apropiadamente?"
      - "¿La lógica es correcta?"
    output: functionality_review

  - name: "Review de código"
    action: "Evaluar calidad del código"
    checklist:
      clean_code:
        - "Nombres descriptivos y consistentes"
        - "Funciones pequeñas (<20 líneas)"
        - "Single responsibility"
        - "No hay código duplicado"
        - "Comentarios solo donde necesario"
      solid:
        - "Single Responsibility Principle"
        - "Open/Closed Principle"
        - "Dependency Inversion"
      style:
        - "Formato consistente"
        - "Imports organizados"
        - "No hay console.log/print debug"
    output: code_quality_review

  - name: "Review de seguridad"
    action: "Verificar aspectos de seguridad"
    checklist:
      - "No hay secrets hardcodeados"
      - "Input validation presente"
      - "No hay SQL injection vulnerabilities"
      - "No hay XSS vulnerabilities"
      - "Autenticación/autorización correcta"
      - "Datos sensibles protegidos"
    output: security_review

  - name: "Review de tests"
    action: "Evaluar cobertura de tests"
    checklist:
      - "Tests unitarios presentes"
      - "Coverage >80%"
      - "Tests cubren happy path"
      - "Tests cubren edge cases"
      - "Tests cubren errores"
      - "Tests son mantenibles"
    output: test_review

  - name: "Review de performance"
    action: "Identificar issues de rendimiento"
    checklist:
      - "No hay N+1 queries"
      - "No hay loops innecesarios"
      - "Uso apropiado de caché"
      - "No hay memory leaks obvios"
      - "Async/await usado correctamente"
    output: performance_review

  - name: "Generar feedback"
    action: "Consolidar comentarios"
    categories:
      must_fix: "Bloqueantes - deben arreglarse"
      should_fix: "Importantes - deberían arreglarse"
      suggestions: "Mejoras opcionales"
      praise: "Cosas bien hechas"
    output: review_feedback

  - name: "Crear review report"
    action: "Documentar resultados"
    template: |
      # Code Review: [Story ID]

      ## Resumen
      - **Resultado**: [APPROVED/CHANGES_REQUESTED/NEEDS_DISCUSSION]
      - **Archivos revisados**: [N]
      - **Issues encontrados**: [N]

      ## Must Fix (Bloqueantes)
      1. [archivo:línea] - [descripción]

      ## Should Fix
      1. [archivo:línea] - [descripción]

      ## Sugerencias
      1. [descripción]

      ## Lo que está bien
      - [punto positivo]

      ## Checklist
      - [x] Funcionalidad correcta
      - [ ] Código limpio
      - [x] Tests adecuados
      - [x] Seguridad OK

      ## Veredicto
      [Explicación del resultado]

outputs:
  - "Review feedback (comentarios en código)"
  - "docs/4-implementation/reviews/[story-id]-review.md"

outcomes:
  APPROVED: "Listo para merge/QA"
  CHANGES_REQUESTED: "Requiere cambios del Dev"
  NEEDS_DISCUSSION: "Requiere discusión de arquitectura"

next_steps:
  if_approved: "*qa-validate [story]"
  if_changes: "*dev-story [story] (fixes)"
