name: create-story
description: Crear story individual desde epic/tech-spec
phase: 4
agent: sm
version: 1.0

triggers:
  - "*create-story [epic-id]"
  - "*story [epic-id]"

inputs:
  - epic_id: "ID del epic"
  - tech_spec: "Tech spec del epic"
  - story_number: "Número de story dentro del epic"

purpose: |
  Crear stories bien definidas que cumplan con INVEST y
  tengan toda la información necesaria para ser implementadas.

steps:
  - name: "Leer tech spec del epic"
    action: "Cargar especificación técnica"
    reads:
      - "docs/3-solutioning/tech-specs/[epic-id]-tech-spec.md"
    output: tech_spec_content

  - name: "Identificar funcionalidades"
    action: "Extraer funcionalidades del tech spec"
    extract:
      - "Features a implementar"
      - "APIs a crear"
      - "Componentes UI"
      - "Modelos de datos"
    output: functionalities[]

  - name: "Descomponer en stories"
    action: "Crear stories siguiendo INVEST"
    principles:
      independent: "Puede desarrollarse sola"
      negotiable: "Describe QUÉ, no CÓMO"
      valuable: "Entrega valor"
      estimable: "Se puede estimar"
      small: "Completable en un sprint"
      testable: "Criterios verificables"
    output: stories[]

  - name: "Definir criterios de aceptación"
    action: "Crear ACs en formato Given-When-Then"
    format: |
      - [ ] **Dado** [contexto]
            **Cuando** [acción]
            **Entonces** [resultado esperado]
    rules:
      - "Cada AC debe ser verificable"
      - "Incluir happy path"
      - "Incluir edge cases principales"
      - "No más de 5-7 ACs por story"
    output: acceptance_criteria[]

  - name: "Estimar story"
    action: "Asignar story points"
    fibonacci: [1, 2, 3, 5, 8, 13]
    guidelines:
      1: "Cambio trivial, <2 horas"
      2: "Tarea simple, 2-4 horas"
      3: "Tarea estándar, 4-8 horas"
      5: "Tarea compleja, 1-2 días"
      8: "Tarea muy compleja, 2-3 días"
      13: "Épica disfrazada, DIVIDIR"
    output: estimation

  - name: "Generar story"
    action: "Crear documento de story"
    template: |
      # Story: [EPIC-ID]-[NUM] - [Título]

      ## Metadata
      - **Epic**: [Nombre del Epic]
      - **Prioridad**: [Must/Should/Could]
      - **Estimación**: [X] puntos
      - **Sprint**: [número o Backlog]
      - **Estado**: Ready

      ## Descripción
      **Como** [rol del usuario]
      **Quiero** [funcionalidad]
      **Para** [beneficio/valor]

      ## Criterios de Aceptación
      - [ ] **Dado** [contexto]
            **Cuando** [acción]
            **Entonces** [resultado]

      - [ ] **Dado** [contexto]
            **Cuando** [acción]
            **Entonces** [resultado]

      ## Notas Técnicas
      [Información relevante del tech-spec]

      ## Mockups/Wireframes
      [Referencias a diseños si existen]

      ## Story Context
      <!-- Generado por *story-context -->
      [Pendiente de generar]

      ## Definition of Done
      - [ ] Código implementado y funcionando
      - [ ] Unit tests escritos (coverage >80%)
      - [ ] Integration tests (si aplica)
      - [ ] Code review aprobado
      - [ ] Documentación actualizada (si aplica)
      - [ ] QA validado

      ## Dependencias
      - [Story o componente del que depende]

      ## Notas
      [Cualquier información adicional]

      ---
      Creado: [fecha]
      Autor: NXT SM
    output: docs/4-implementation/stories/[epic-id]-[num].md

outputs:
  - docs/4-implementation/stories/[epic-id]-[num].md

checklist:
  - "¿La story es INDEPENDENT?"
  - "¿Es NEGOTIABLE (describe qué, no cómo)?"
  - "¿Entrega VALUABLE?"
  - "¿Es ESTIMABLE?"
  - "¿Es SMALL (cabe en un sprint)?"
  - "¿Es TESTABLE (ACs verificables)?"
  - "¿Los ACs usan Given-When-Then?"
  - "¿Tiene 5-7 ACs máximo?"
  - "¿La estimación es razonable (no >8 puntos)?"

next_steps:
  - "*story-context [story-id] para generar contexto"
  - "*create-story [epic-id] para crear más stories del epic"
  - "*sprint-planning para planificar sprint"
