name: plan-project
description: Planificación adaptativa según escala del proyecto
phase: 2
agent: pm
version: 1.0

triggers:
  - "*plan-project"
  - "*planificar"

inputs:
  - project_brief: "Brief del proyecto (de fase 1)"
  - scale: "Escala detectada (quick/standard/enterprise)"

purpose: |
  Este workflow adapta la planificación según el tamaño del proyecto.
  No todos los proyectos necesitan el mismo nivel de detalle.

steps:
  - name: "Evaluar escala"
    action: "Confirmar o ajustar escala del proyecto"
    criteria:
      quick:
        stories: "1-15"
        duration: "<2 semanas"
        artifacts: "Tech spec básico"
      standard:
        stories: "15-50"
        duration: "2-8 semanas"
        artifacts: "PRD completo + arquitectura"
      enterprise:
        stories: "50+"
        duration: ">8 semanas"
        artifacts: "PRD + arquitectura + roadmap + governance"
    output: confirmed_scale

  - name: "Quick Track"
    condition: "scale == 'quick'"
    action: "Planificación ligera"
    tasks:
      - "Crear tech spec de 1-2 páginas"
      - "Definir 3-5 criterios de éxito"
      - "Listar stories principales"
      - "Estimar tiempo total"
    output: quick_plan
    skip_to: "Generar entregables"

  - name: "Standard Track"
    condition: "scale == 'standard'"
    action: "Planificación completa"
    tasks:
      - "Crear PRD completo (5-10 páginas)"
      - "Definir epics y stories"
      - "Priorizar con MoSCoW"
      - "Crear roadmap de 2-3 fases"
      - "Identificar riesgos principales"
    output: standard_plan

  - name: "Enterprise Track"
    condition: "scale == 'enterprise'"
    action: "Planificación exhaustiva"
    tasks:
      - "Crear PRD detallado (15+ páginas)"
      - "Definir epics, features y stories"
      - "Priorizar con matriz valor/esfuerzo"
      - "Crear roadmap multi-fase"
      - "Definir governance y roles"
      - "Análisis de riesgos completo"
      - "Plan de comunicación"
      - "Métricas de éxito detalladas"
    output: enterprise_plan

  - name: "Generar entregables"
    action: "Crear documentos según escala"
    quick:
      - "tech-spec-lite.md"
    standard:
      - "prd.md"
      - "roadmap.md"
      - "epics-overview.md"
    enterprise:
      - "prd.md"
      - "prd.docx"
      - "roadmap.md"
      - "roadmap.pptx"
      - "epics-overview.md"
      - "risk-assessment.md"
      - "governance.md"

outputs:
  quick:
    - "docs/2-planning/tech-spec-lite.md"
  standard:
    - "docs/2-planning/prd.md"
    - "docs/2-planning/roadmap.md"
  enterprise:
    - "docs/2-planning/prd.md"
    - "docs/2-planning/prd.docx"
    - "docs/2-planning/roadmap.md"
    - "docs/2-planning/governance.md"

next_steps:
  quick: "*create-story"
  standard: "*create-prd → *architecture"
  enterprise: "*create-prd → *architecture → *create-epics"
