name: create-prd
description: Generar PRD (Product Requirements Document) completo
phase: 2
agent: pm
version: 1.0

triggers:
  - "*create-prd"
  - "*prd"

inputs:
  - project_brief: "docs/1-analysis/project-brief.md"
  - scale: "Track del proyecto (quick/standard/enterprise)"

purpose: |
  Crear el PRD que define completamente los requisitos del producto.
  Es el contrato entre negocio y desarrollo.

scale_adaptation:
  quick:
    depth: "Básico"
    pages: "2-3"
    sections: "Reducidas"
    detail: "Alto nivel"
  standard:
    depth: "Completo"
    pages: "5-10"
    sections: "Todas"
    detail: "Detallado"
  enterprise:
    depth: "Exhaustivo"
    pages: "15+"
    sections: "Todas + anexos"
    detail: "Muy detallado + trazabilidad"

steps:
  - name: "Leer inputs"
    action: "Cargar documentos de análisis"
    sources:
      - "docs/1-analysis/project-brief.md"
      - "docs/1-analysis/brainstorming-*.md"
      - "docs/1-analysis/research-*.md"
    output: analysis_context

  - name: "Definir visión y objetivos"
    action: "Establecer visión del producto"
    include:
      - "Vision statement"
      - "Objetivos de negocio con KPIs"
      - "Métricas de éxito"
    output: vision_objectives

  - name: "Documentar usuarios"
    action: "Detallar usuarios objetivo"
    for_each_persona:
      - "Nombre representativo"
      - "Demografía"
      - "Comportamiento"
      - "Necesidades"
      - "Pain points"
      - "User journey"
    output: user_personas

  - name: "Definir requisitos funcionales"
    action: "Listar todas las funcionalidades"
    format:
      id: "RF-XXX"
      requirement: "Descripción"
      priority: "Must/Should/Could/Won't"
      epic: "Epic al que pertenece"
      acceptance_criteria: "Criterios de aceptación"
    output: functional_requirements[]

  - name: "Definir requisitos no funcionales"
    action: "Documentar NFRs"
    categories:
      - performance: "Tiempos de respuesta, throughput"
      - security: "Autenticación, autorización, encriptación"
      - scalability: "Usuarios concurrentes, crecimiento"
      - availability: "Uptime, SLAs"
      - maintainability: "Documentación, testing"
      - usability: "Accesibilidad, UX"
    output: non_functional_requirements[]

  - name: "Definir out of scope"
    action: "Documentar qué NO se incluye"
    purpose: "Evitar scope creep"
    output: out_of_scope[]

  - name: "Identificar dependencias"
    action: "Listar dependencias externas"
    types:
      - "Sistemas externos"
      - "APIs de terceros"
      - "Recursos humanos"
      - "Aprobaciones"
    output: dependencies[]

  - name: "Análisis de riesgos"
    action: "Documentar riesgos y mitigaciones"
    format:
      risk: "Descripción del riesgo"
      probability: "Alta/Media/Baja"
      impact: "Alto/Medio/Bajo"
      mitigation: "Plan de mitigación"
    output: risks[]

  - name: "Definir timeline"
    action: "Establecer fases y milestones"
    milestones:
      - "MVP"
      - "Beta"
      - "Launch"
    output: timeline

  - name: "Generar PRD"
    action: "Compilar documento final"
    output: docs/2-planning/prd.md

  - name: "Crear pitch deck"
    action: "Generar presentación resumen"
    conditional: "Si scale != quick"
    output: docs/2-planning/prd-pitch.pptx

outputs:
  - docs/2-planning/prd.md
  - docs/2-planning/prd-pitch.pptx (opcional)

checklist:
  - "¿La visión es clara y concisa?"
  - "¿Hay al menos una persona detallada?"
  - "¿Todos los requisitos tienen ID único?"
  - "¿Se aplicó priorización MoSCoW?"
  - "¿Los criterios de éxito son medibles?"
  - "¿El out of scope está claramente definido?"
  - "¿Los riesgos tienen mitigaciones?"

next_steps:
  - "*architecture para diseñar la arquitectura"
  - "*create-epics para extraer epics del PRD"
